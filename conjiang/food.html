<div class="container"><div class="card"><h2>从江香猪</h2><p>国家地理标志产品，肉质细嫩、鲜香可口，是从江最知名的美食。</p><br><h2>从江腌鱼</h2><p>侗族传统特色菜，酸香开胃，传承百年的腌制工艺。</p><br><h2>香糯米饭</h2><p>高山原生态糯米，清香软糯，是苗侗人民的主食。</p><br><h2>油茶</h2><p>苗侗待客必备饮品，暖胃养生，风味独特。</p><br><h2>羊瘪汤</h2><p>从江特色养生美食，当地宴席必备佳肴。</p></div></div>
